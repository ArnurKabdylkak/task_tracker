services:
  bot:
    build: .
    image: tasktracker:latest
    container_name: tasktracker
    restart: unless-stopped
    # Настройки берутся из .env (скопируйте .env.example в .env и заполните).
    env_file: .env
    # БД хранится в именованном volume, чтобы переживать пересоздание контейнера.
    volumes:
      - tasktracker-data:/data

volumes:
  tasktracker-data:
